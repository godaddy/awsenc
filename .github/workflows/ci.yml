name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    uses: jgowdy/libenclaveapp/.github/workflows/reusable-ci.yml@main
    with:
      platforms: '["macos-latest", "ubuntu-latest", "windows-latest"]'
      cargo_args: "--features awsenc-secure-storage/mock"
