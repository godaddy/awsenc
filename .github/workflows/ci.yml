name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: jgowdy/libenclaveapp
          path: ../libenclaveapp
          token: ${{ secrets.LIBENCLAVEAPP_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --features awsenc-secure-storage/mock --tests -- -D warnings
      - name: Test
        run: cargo test --workspace --features awsenc-secure-storage/mock
