name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: jgowdy/libenclaveapp
          path: ../libenclaveapp
          token: ${{ secrets.LIBENCLAVEAPP_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Update Cargo.toml version (unix)
        if: runner.os != 'Windows'
        run: |
          sed -i '' "s/^version = \".*\"/version = \"${{ steps.version.outputs.version }}\"/" Cargo.toml

      - name: Update Cargo.toml version (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          (Get-Content Cargo.toml) -replace '^version = ".*"', "version = `"${{ steps.version.outputs.version }}`"" | Set-Content Cargo.toml

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Test (macOS)
        if: matrix.target == 'aarch64-apple-darwin'
        run: cargo test --workspace --features awsenc-secure-storage/mock

      - name: Test (Windows)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        run: cargo test --workspace --features awsenc-secure-storage/mock

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/awsenc dist/
          cd dist && tar czf ../awsenc-${{ matrix.target }}.tar.gz awsenc

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target/${{ matrix.target }}/release/awsenc.exe" dist/
          Copy-Item "target/${{ matrix.target }}/release/awsenc-tpm-bridge.exe" dist/
          Compress-Archive -Path dist/* -DestinationPath "awsenc-${{ matrix.target }}.zip"

      - name: Build MSI (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 5.*
          wix build installer/awsenc.wxs -o awsenc-${{ matrix.target }}.msi -bindpath .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: awsenc-${{ matrix.target }}
          path: awsenc-${{ matrix.target }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release
          cp artifacts/awsenc-aarch64-apple-darwin/awsenc-aarch64-apple-darwin.tar.gz release/
          cp artifacts/awsenc-x86_64-apple-darwin/awsenc-x86_64-apple-darwin.tar.gz release/
          cp artifacts/awsenc-x86_64-pc-windows-msvc/awsenc-x86_64-pc-windows-msvc.zip release/
          cp artifacts/awsenc-x86_64-pc-windows-msvc/awsenc-x86_64-pc-windows-msvc.msi release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true

  update-packages:
    name: Update Package Managers
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Compute SHA256s
        id: sha
        run: |
          arm_sha=$(sha256sum artifacts/awsenc-aarch64-apple-darwin/awsenc-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)
          intel_sha=$(sha256sum artifacts/awsenc-x86_64-apple-darwin/awsenc-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)
          win_sha=$(sha256sum artifacts/awsenc-x86_64-pc-windows-msvc/awsenc-x86_64-pc-windows-msvc.zip | cut -d' ' -f1)
          msi_sha=$(sha256sum artifacts/awsenc-x86_64-pc-windows-msvc/awsenc-x86_64-pc-windows-msvc.msi | cut -d' ' -f1)
          echo "arm_sha256=$arm_sha" >> "$GITHUB_OUTPUT"
          echo "intel_sha256=$intel_sha" >> "$GITHUB_OUTPUT"
          echo "win_sha256=$win_sha" >> "$GITHUB_OUTPUT"
          echo "msi_sha256=$msi_sha" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew tap
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"

          git clone https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/jgowdy/homebrew-awsenc.git /tmp/tap

          cat > /tmp/tap/Formula/awsenc.rb << FORMULA
          class Awsenc < Formula
            desc "Hardware-backed AWS credential manager using Secure Enclave / TPM"
            homepage "https://github.com/jgowdy/awsenc"
            version "${version}"
            license "MIT"

            on_arm do
              url "https://github.com/jgowdy/awsenc/releases/download/${tag}/awsenc-aarch64-apple-darwin.tar.gz"
              sha256 "${{ steps.sha.outputs.arm_sha256 }}"
            end

            on_intel do
              url "https://github.com/jgowdy/awsenc/releases/download/${tag}/awsenc-x86_64-apple-darwin.tar.gz"
              sha256 "${{ steps.sha.outputs.intel_sha256 }}"
            end

            depends_on :macos

            def install
              bin.install "awsenc"
            end

            def caveats
              <<~EOS
                To configure awsenc with the AWS CLI:

                  awsenc install --profile <name> \\\\
                    --organization <org>.okta.com \\\\
                    --application <app-url> \\\\
                    --role <role-arn>

                To add shell integration (export detection + awsenc-use):

                  # bash: add to ~/.bashrc
                  eval "\\\$(awsenc shell-init bash)"

                  # zsh: add to ~/.zshrc
                  eval "\\\$(awsenc shell-init zsh)"

                  # fish: add to ~/.config/fish/config.fish
                  awsenc shell-init fish | source
              EOS
            end

            test do
              assert_match "awsenc", shell_output("\#{bin}/awsenc --help")
            end
          end
          FORMULA
          sed -i 's/^          //' /tmp/tap/Formula/awsenc.rb

          cd /tmp/tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Update awsenc to ${tag}"
          git push

      - name: Update Scoop bucket
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"

          git clone https://x-access-token:${{ secrets.SCOOP_BUCKET_TOKEN }}@github.com/jgowdy/scoop-awsenc.git /tmp/bucket

          cat > /tmp/bucket/bucket/awsenc.json << SCOOP
          {
              "version": "${version}",
              "description": "Hardware-backed AWS credential manager (Windows TPM 2.0)",
              "homepage": "https://github.com/jgowdy/awsenc",
              "license": "MIT",
              "architecture": {
                  "64bit": {
                      "url": "https://github.com/jgowdy/awsenc/releases/download/${tag}/awsenc-x86_64-pc-windows-msvc.zip",
                      "hash": "${{ steps.sha.outputs.win_sha256 }}"
                  }
              },
              "bin": [
                  "awsenc.exe",
                  "awsenc-tpm-bridge.exe"
              ],
              "post_install": "Write-Host 'Run \"awsenc install --profile <name>\" to configure the AWS CLI.'",
              "notes": [
                  "Run 'awsenc install --profile <name>' to configure the AWS CLI.",
                  "Run 'awsenc auth <profile>' to authenticate with Okta.",
                  "Run 'awsenc shell-init powershell' for shell integration."
              ]
          }
          SCOOP
          sed -i 's/^          //' /tmp/bucket/bucket/awsenc.json

          cd /tmp/bucket
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Update awsenc to ${tag}"
          git push

      - name: Generate winget manifest
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"
          msi_sha=$(echo "${{ steps.sha.outputs.msi_sha256 }}" | tr 'a-f' 'A-F')

          mkdir -p /tmp/winget

          sed -e "s/PackageVersion: .*/PackageVersion: ${version}/" \
            winget/JGowdy.awsenc.yaml > /tmp/winget/JGowdy.awsenc.yaml

          sed -e "s/PackageVersion: .*/PackageVersion: ${version}/" \
              -e "s|InstallerUrl: .*|InstallerUrl: https://github.com/jgowdy/awsenc/releases/download/${tag}/awsenc-x86_64-pc-windows-msvc.msi|" \
              -e "s/InstallerSha256: .*/InstallerSha256: ${msi_sha}/" \
            winget/JGowdy.awsenc.installer.yaml > /tmp/winget/JGowdy.awsenc.installer.yaml

          sed -e "s/PackageVersion: .*/PackageVersion: ${version}/" \
              -e "s|ReleaseNotesUrl: .*|ReleaseNotesUrl: https://github.com/jgowdy/awsenc/releases/tag/${tag}|" \
            winget/JGowdy.awsenc.locale.en-US.yaml > /tmp/winget/JGowdy.awsenc.locale.en-US.yaml

          echo "Generated winget manifests for ${version}:"
          cat /tmp/winget/JGowdy.awsenc.yaml
          echo "---"
          cat /tmp/winget/JGowdy.awsenc.installer.yaml
          echo "---"
          cat /tmp/winget/JGowdy.awsenc.locale.en-US.yaml

      - name: Upload winget manifest
        uses: actions/upload-artifact@v4
        with:
          name: winget-manifest
          path: /tmp/winget/
