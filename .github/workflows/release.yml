name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Update Cargo.toml version
        run: |
          sed -i '' "s/^version = \".*\"/version = \"${{ steps.version.outputs.version }}\"/" Cargo.toml

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Test
        if: matrix.target == 'aarch64-apple-darwin'
        run: cargo test --workspace --features awsenc-secure-storage/mock

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/awsenc dist/
          cd dist && tar czf ../awsenc-${{ matrix.target }}.tar.gz awsenc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: awsenc-${{ matrix.target }}
          path: awsenc-${{ matrix.target }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect tarballs
        run: |
          mkdir -p release
          cp artifacts/awsenc-aarch64-apple-darwin/awsenc-aarch64-apple-darwin.tar.gz release/
          cp artifacts/awsenc-x86_64-apple-darwin/awsenc-x86_64-apple-darwin.tar.gz release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true

  update-formula:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Compute SHA256 checksums
        id: sha
        run: |
          ARM_SHA=$(sha256sum artifacts/awsenc-aarch64-apple-darwin/awsenc-aarch64-apple-darwin.tar.gz | cut -d ' ' -f 1)
          X86_SHA=$(sha256sum artifacts/awsenc-x86_64-apple-darwin/awsenc-x86_64-apple-darwin.tar.gz | cut -d ' ' -f 1)
          echo "arm64=$ARM_SHA" >> "$GITHUB_OUTPUT"
          echo "x86_64=$X86_SHA" >> "$GITHUB_OUTPUT"

      - name: Clone homebrew-awsenc tap repo
        uses: actions/checkout@v4
        with:
          repository: jgowdy/homebrew-awsenc
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-awsenc

      - name: Update Formula
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARM_SHA="${{ steps.sha.outputs.arm64 }}"
          X86_SHA="${{ steps.sha.outputs.x86_64 }}"

          cat > homebrew-awsenc/Formula/awsenc.rb << 'FORMULA'
          class Awsenc < Formula
            desc "Hardware-backed AWS credential manager using Secure Enclave / TPM"
            homepage "https://github.com/jgowdy/awsenc"
          FORMULA

          cat >> homebrew-awsenc/Formula/awsenc.rb << FORMULA
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/jgowdy/awsenc/releases/download/v${VERSION}/awsenc-aarch64-apple-darwin.tar.gz"
                sha256 "${ARM_SHA}"
              else
                url "https://github.com/jgowdy/awsenc/releases/download/v${VERSION}/awsenc-x86_64-apple-darwin.tar.gz"
                sha256 "${X86_SHA}"
              end
            end

            def install
              bin.install "awsenc"
            end

            def caveats
              <<~EOS
                To configure awsenc with the AWS CLI:

                  awsenc install --profile <name> \\\\
                    --organization <org>.okta.com \\\\
                    --application <app-url> \\\\
                    --role <role-arn>

                To add shell integration (export detection + awsenc-use):

                  # bash: add to ~/.bashrc
                  eval "\\\$(awsenc shell-init bash)"

                  # zsh: add to ~/.zshrc
                  eval "\\\$(awsenc shell-init zsh)"

                  # fish: add to ~/.config/fish/config.fish
                  awsenc shell-init fish | source
              EOS
            end

            test do
              assert_match "awsenc", shell_output("\#{bin}/awsenc --help")
            end
          end
          FORMULA

      - name: Commit and push formula update
        working-directory: homebrew-awsenc
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/awsenc.rb
          git diff --staged --quiet || git commit -m "Update awsenc to v${{ steps.version.outputs.version }}"
          git push origin main
