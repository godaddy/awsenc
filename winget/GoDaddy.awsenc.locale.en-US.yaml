License: MIT
LicenseUrl: https://github.com/godaddy/awsenc/blob/main/LICENSE
ShortDescription: Hardware-backed AWS credential manager using Windows TPM 2.0
Description: |-
  awsenc encrypts AWS session credentials at rest using the Secure Enclave (macOS) or
  TPM 2.0 (Windows). Integrates with the AWS CLI via credential_process. Authenticates
  through Okta SAML with MFA support (YubiKey OTP, push, TOTP). Replaces
  aws-okta-processor with a single static binary.
